<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon: the Piráti a Zelení pro Lískovec mark — a black pirate flag on
     its pole inside the teal-to-green gradient ring, with the coalition's
     coral-pink flower tucked against the ring's lower right, matching the
     2026 logo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Piráti a Zelení pro Lískovec">
  <defs>
    <linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#03645a"/>
      <stop offset="1" stop-color="#0bd26f"/>
    </linearGradient>
    <linearGradient id="flower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff96ab"/>
      <stop offset="1" stop-color="#ff6272"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#ffffff"/>
  <circle cx="31" cy="30" r="22" fill="none" stroke="url(#ring)" stroke-width="5"/>
  <rect x="25.5" y="14" width="3.2" height="32" rx="1.5" fill="#141414"/>
  <path d="M28.5 16 C39 17 41 22 45 23 C41 25 39 29 28.5 30 Z" fill="#141414"/>
  <g fill="url(#flower)" transform="translate(47,49) scale(0.92)">
    <rect x="-3.2" y="-11" width="6.4" height="22" rx="3.2"/>
    <rect x="-3.2" y="-11" width="6.4" height="22" rx="3.2" transform="rotate(60)"/>
    <rect x="-3.2" y="-11" width="6.4" height="22" rx="3.2" transform="rotate(-60)"/>
  </g>
</svg>
