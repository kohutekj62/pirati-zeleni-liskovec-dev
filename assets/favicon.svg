<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon: the "ON" toggle switch from our logo, in the brand colours.
     SVG so it stays crisp at every size. Black bg · violet · yellow · green. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="SLON">
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- three brand dots -->
  <circle cx="20" cy="16" r="4" fill="#7a2e8e"/>
  <circle cx="32" cy="16" r="4" fill="#f2c500"/>
  <circle cx="44" cy="16" r="4" fill="#8dc540"/>
  <!-- toggle track -->
  <rect x="12" y="30" width="40" height="22" rx="11" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- knob on the right = switched ON -->
  <circle cx="41" cy="41" r="8" fill="#8dc540"/>
</svg>
