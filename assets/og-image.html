<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/fonts.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:1200px; overflow:hidden; background:#0a0a0a; }
/*
  Square canvas on purpose: WhatsApp's link-preview thumbnail doesn't
  crop a wide (1200x630) og:image to a square the way Facebook/Twitter
  do — it non-uniformly squishes it instead, distorting the panel and
  wordmark. A 1:1 source needs no transform on any platform, so nothing
  can squeeze or crop unpredictably.
*/
.og { width:1200px; height:1200px; position:relative; overflow:hidden; font-family:'Roboto',sans-serif; }

.og__photo {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center; display:block;
}
.og__scrim {
  position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.32) 100%);
}

/*
  Kept deliberately minimal: WhatsApp/Messenger shrink this to a tiny
  chat-bubble thumbnail (well under 100px), where small text (kicker,
  tagline, party tags) turns to mush. Logo + one big wordmark is the
  only thing that stays legible at that size, so that's all this shows.
*/
.og__panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background: rgba(6,6,6,0.88);
  border: 2px solid rgba(11,210,111,0.55);
  border-radius: 24px;
  padding: 44px 60px;
  display: flex; flex-direction: column; align-items:center;
}

.og__logo   { height:100px; margin-bottom:26px; display:block;
              background:#fff; padding:12px 18px; border-radius:14px; box-sizing:content-box; }

.og__headline {
  font-family:'Bebas Neue',sans-serif; font-size:92px; line-height:0.95;
  color:#f9f9fa; text-align:center;
}
</style>
</head>
<body>
<div class="og">

  <!--
    === HOW TO RE-RENDER assets/og-pic.png ===
    1. Open this file in Chrome at 100% zoom and screenshot the page
       (1200×1200), or drive it headlessly (viewport 1200×1200) and save
       the capture as assets/og-pic.png.
    2. To swap the photo, replace ../header-photo.jpg below with any
       landscape photo of Starý Lískovec (at least 1200×1200 px covered)
       and re-render.
    3. Keep the canvas square (1200×1200) — see the note above .og in the
       <style> block for why. If you resize it, also update
       og:image:width / og:image:height in index.html and pexeso/index.html.
  -->
  <img src="../header-photo.jpg" alt="" class="og__photo">
  <div class="og__scrim"></div>

  <div class="og__panel">
    <img src="../assets/logo-pirati-zeleni.png" class="og__logo" alt="">
    <h1 class="og__headline">
      PIR&Aacute;TI<br>A ZELEN&Iacute;
    </h1>
  </div>

</div>
</body>
</html>
