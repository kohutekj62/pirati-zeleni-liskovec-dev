<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pexeso – Piráti a Zelení pro Lískovec</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 240px;
    }

    .card__logo {
      width: 240px;
      height: auto;
      display: block;
      background: #fff;
      border-radius: 12px 12px 0 0;
      padding: 26px 20px 18px;
      filter: drop-shadow(0 6px 18px rgba(88,52,166,0.25));
    }

    .card__qr-link {
      display: block;
      width: 240px;
      line-height: 0;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
      position: relative;
      animation: pulse 2.8s ease-in-out infinite;
    }

    .card__qr-link::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 0 0 3px #8867cf, 0 0 24px 4px rgba(136,103,207,0.35);
      pointer-events: none;
      z-index: 1;
    }

    #qr-box { width: 240px; height: 240px; }
    #qr-box img,
    #qr-box canvas { width: 240px !important; height: 240px !important; display: block !important; }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(136,103,207,0.4)); }
      50%       { filter: drop-shadow(0 0 22px rgba(136,103,207,0.85))
                          drop-shadow(0 0 40px rgba(72,192,120,0.3)); }
    }

    @media print {
      body { background: #fff; padding: 0; }
      .card { width: 100%; }
      .card__logo { width: 100%; filter: none; }
      .card__qr-link { width: 100%; animation: none; }
      .card__qr-link::before { display: none; }
      #qr-box, #qr-box img, #qr-box canvas { width: 100% !important; height: auto !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="card__logo"
         src="https://kohutekj62.github.io/SL-ON/assets/logo-pirati-zeleni.png"
         alt="Piráti a Zelení pro Lískovec" />
    <a class="card__qr-link"
       href="https://kohutekj62.github.io/SL-ON/pexeso/"
       target="_blank"
       rel="noopener">
      <div id="qr-box"></div>
    </a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
          integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script>
    new QRCode(document.getElementById("qr-box"), {
      text: "https://kohutekj62.github.io/SL-ON/pexeso/",
      width: 240,
      height: 240,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
