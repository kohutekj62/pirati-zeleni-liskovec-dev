<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pexeso – Starý Lískovec ON</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      width: 264px;
      text-align: center;
      box-shadow: 0 6px 32px rgba(0,0,0,0.18);
    }

    .card__elephant {
      width: 224px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .card__qr-link {
      display: block;
      width: 224px;
      margin: 0 auto;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #111;
      line-height: 0;
    }

    .card__qr-link:hover { border-color: #8dc540; }

    #qr-box { width: 224px; height: 224px; }
    #qr-box img,
    #qr-box canvas { width: 224px !important; height: 224px !important; display: block !important; }

    @media print {
      body { background: #fff; padding: 0; display: block; }
      .card { box-shadow: none; border-radius: 0; width: 100%; padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="card__elephant"
         src="https://kohutekj62.github.io/SL-ON/assets/who-is-who.png"
         alt="Starý Lískovec ON" />
    <a class="card__qr-link"
       href="https://kohutekj62.github.io/SL-ON/pexeso/"
       target="_blank"
       rel="noopener">
      <div id="qr-box"></div>
    </a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
          integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script>
    new QRCode(document.getElementById("qr-box"), {
      text: "https://kohutekj62.github.io/SL-ON/pexeso/",
      width: 224,
      height: 224,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
