<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stránka nenalezena – Piráti a Zelení pro Lískovec</title>
  <script>
    (function () {
      var root = location.hostname === 'kohutekj62.github.io' ? '/SL-ON/' : '/';
      var b = document.createElement('base');
      b.href = root;
      document.currentScript.parentNode.insertBefore(b, document.currentScript);
      window._siteRoot = root;
    }());
  </script>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=8d97749d" />
  <link rel="stylesheet" href="css/fonts.css?v=e0b8a13a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --text:      #1a1a1a;
      --muted:     #585c58;
      --green:     #0bd26f;
      --green-ink: #078245;
      --green-dark:#06713c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto", system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    img.logo {
      width: 220px;
      height: auto;
    }

    h1 {
      font-family: "Bebas Neue", "Arial Narrow", sans-serif;
      font-size: clamp(5rem, 20vw, 9rem);
      line-height: 1;
      color: var(--green-ink);
      letter-spacing: 0.02em;
    }

    p.lead {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 36ch;
      line-height: 1.6;
    }

    a.btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: var(--green);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.btn:hover { background: var(--green-dark); }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: 0.8rem;
      color: #888c88;
    }
  </style>
</head>
<body>
  <img class="logo" src="assets/logo-pirati-zeleni.png?v=4bd86f88" alt="Piráti a Zelení pro Lískovec" />
  <h1>404</h1>
  <p class="lead">Tato stránka neexistuje. Možná byl odkaz přepsán nebo smazán.</p>
  <a class="btn" id="btn-home" href="/">Zpět na hlavní stránku</a>
  <script>document.getElementById('btn-home').href = window._siteRoot;</script>
  <footer>Piráti a Zelení pro Lískovec</footer>
</body>
</html>
